<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetCare - AI Veterinary Assistant</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🐾</span>
                    <span class="logo-text">VetCare</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <button class="nav-item active" onclick="newChat()">
                    <span class="nav-icon">💬</span>
                    <span class="nav-label">New Chat</span>
                </button>
                <button class="nav-item" onclick="showServices()">
                    <span class="nav-icon">🩺</span>
                    <span class="nav-label">Services</span>
                </button>
                <button class="nav-item" onclick="showOffers()">
                    <span class="nav-icon">🎁</span>
                    <span class="nav-label">Offers</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="clinic-info">
                    <span class="clinic-icon">🏥</span>
                    <div class="clinic-details">
                        <span class="clinic-name">Meadow Vet Care</span>
                        <span class="clinic-status">● Online Now</span>
                    </div>
                </div>
                <button class="emergency-btn" onclick="callEmergency()">
                    <span>🚨</span>
                    <span>Emergency: (555) 123-4567</span>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main">
            <!-- Chat Header -->
            <header class="chat-header">
                <div class="header-left">
                    <span class="header-avatar">🤖</span>
                    <div class="header-info">
                        <h1>VetCare Assistant</h1>
                        <span class="status">Online • Usually replies instantly</span>
                    </div>
                </div>
                <div class="header-right">
                    <button class="icon-btn" onclick="clearChat()" title="Clear chat">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Messages -->
            <div class="messages" id="chatMessages">
                <!-- Welcome Message -->
                <div class="message bot">
                    <div class="avatar">🐾</div>
                    <div class="content">
                        <div class="bubble">
                            <p>Hi there! 👋 I'm your AI veterinary assistant at Meadow Vet Care.</p>
                            <p>I can help you with:</p>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="message bot">
                    <div class="avatar">🐾</div>
                    <div class="content">
                        <div class="quick-actions">
                            <button onclick="askQuestion('What services do you offer?')">
                                <span>🔍</span>
                                <span>View Services</span>
                            </button>
                            <button onclick="askQuestion('Show me prices')">
                                <span>💰</span>
                                <span>Check Prices</span>
                            </button>
                            <button onclick="askQuestion('Book an appointment')">
                                <span>📅</span>
                                <span>Book Now</span>
                            </button>
                            <button onclick="askQuestion('Any special offers today?')">
                                <span>🎁</span>
                                <span>Special Offers</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Species Selection -->
                <div class="message bot">
                    <div class="avatar">🐾</div>
                    <div class="content">
                        <div class="bubble">
                            <p>What type of pet do you have?</p>
                        </div>
                        <div class="species-selector">
                            <button onclick="askQuestion('Services for dogs')">
                                <span>🐕</span>
                                <span>Dog</span>
                            </button>
                            <button onclick="askQuestion('Services for cats')">
                                <span>🐈</span>
                                <span>Cat</span>
                            </button>
                            <button onclick="askQuestion('Services for rabbits')">
                                <span>🐰</span>
                                <span>Rabbit</span>
                            </button>
                            <button onclick="askQuestion('Services for birds')">
                                <span>🐦</span>
                                <span>Bird</span>
                            </button>
                            <button onclick="askQuestion('Services for small mammals')">
                                <span>🐹</span>
                                <span>Small Pet</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <form id="chatForm" class="input-form">
                    <div class="input-container">
                        <input 
                            type="text" 
                            id="userInput" 
                            placeholder="Ask about services, prices, or book an appointment..." 
                            autocomplete="off"
                            required
                        >
                        <button type="submit" id="sendBtn" class="send-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                            </svg>
                        </button>
                    </div>
                </form>
                <p class="disclaimer">AI-powered assistant • For emergencies, call (555) 123-4567</p>
            </div>
        </main>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
